<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dental Virtual Assistant</title>
<style>
  :root {
    --teal-900: #0f3d3e;
    --teal-700: #1f6f6b;
    --teal-500: #2b8a86;
    --teal-100: #e6f2f1;
    --bg: #f6f9f9;
    --surface: #ffffff;
    --text: #17252a;
    --text-muted: #5b6b6a;
    --border: #dbe6e5;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--teal-900);
    color: #fff;
    padding: 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }

  header h1 {
    margin: 0;
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header p {
    margin: 0;
    font-size: 0.85rem;
    color: #cfe6e4;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    overflow: hidden;
  }

  #chat-container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
    overflow: hidden;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 4px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble-row {
    display: flex;
  }

  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: var(--radius);
    line-height: 1.45;
    font-size: 0.95rem;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .bubble.user {
    background: var(--teal-700);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble.assistant {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble.assistant.pending::after {
    content: "";
    display: inline-block;
    width: 6px;
    height: 6px;
    margin-left: 2px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: blink 1s infinite;
    vertical-align: middle;
  }

  .bubble.error {
    background: #fdecea;
    color: #7a2a20;
    border: 1px solid #f2c6bf;
  }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  #input-bar {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    padding: 14px 4px 20px;
    border-top: 1px solid var(--border);
  }

  #message-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    background: var(--surface);
    max-height: 120px;
  }

  #message-input:focus {
    border-color: var(--teal-500);
  }

  #send-btn {
    background: var(--teal-700);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  #send-btn:hover:not(:disabled) {
    background: var(--teal-900);
  }

  #send-btn:disabled {
    background: #a9c4c2;
    cursor: not-allowed;
  }

  .disclaimer {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    padding-bottom: 10px;
  }
</style>
</head>
<body>

<header>
  <h1 id="practice-name">Virtual Assistant</h1>
  <p id="practice-tagline">Loading...</p>
</header>

<main>
  <div id="chat-container">
    <div id="messages"></div>
    <div class="disclaimer">This assistant can't give medical advice. For anything clinical, please call the office.</div>
    <div id="input-bar">
      <textarea id="message-input" rows="1" placeholder="Ask about hours, services, insurance..."></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</main>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("message-input");
  const sendBtn = document.getElementById("send-btn");

  // Full conversation history, kept client-side for the session and resent
  // in full with every request (the API itself is stateless).
  const conversation = [];

  let isStreaming = false;

  async function loadPracticeInfo() {
    try {
      const res = await fetch("/practice-info");
      const data = await res.json();
      document.getElementById("practice-name").textContent = data.name;
      document.getElementById("practice-tagline").textContent = data.tagline + " — Virtual Assistant";
      document.title = data.name + " — Virtual Assistant";
    } catch {
      document.getElementById("practice-tagline").textContent = "Virtual Assistant";
    }
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addBubble(role, text) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function setStreaming(streaming) {
    isStreaming = streaming;
    sendBtn.disabled = streaming;
    inputEl.disabled = streaming;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    inputEl.value = "";
    autoResize();
    addBubble("user", text);
    conversation.push({ role: "user", content: text });

    setStreaming(true);
    const assistantBubble = addBubble("assistant", "");
    assistantBubble.classList.add("pending");
    let assistantText = "";

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversation }),
      });

      if (!response.ok || !response.body) {
        throw new Error("Request failed");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const events = buffer.split("\n\n");
        buffer = events.pop(); // last (possibly partial) event stays buffered

        for (const rawEvent of events) {
          let eventType = "message";
          let data = "";
          for (const line of rawEvent.split("\n")) {
            if (line.startsWith("event:")) eventType = line.slice(6).trim();
            else if (line.startsWith("data:")) data = line.slice(5).trim();
          }
          if (!data) continue;

          if (eventType === "error") {
            assistantBubble.classList.remove("pending");
            assistantBubble.classList.add("error");
            assistantBubble.textContent = JSON.parse(data);
            assistantText = null; // don't record a broken reply in history
          } else if (eventType === "done") {
            // no-op — handled after the loop
          } else {
            assistantBubble.classList.remove("pending");
            assistantText += JSON.parse(data);
            assistantBubble.textContent = assistantText;
            scrollToBottom();
          }
        }
      }

      if (assistantText) {
        conversation.push({ role: "assistant", content: assistantText });
      }
    } catch (err) {
      assistantBubble.classList.remove("pending");
      assistantBubble.classList.add("error");
      assistantBubble.textContent = "Connection error. Please try again.";
    } finally {
      setStreaming(false);
      inputEl.focus();
    }
  }

  function autoResize() {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  }

  inputEl.addEventListener("input", autoResize);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener("click", sendMessage);

  loadPracticeInfo();
  addBubble("assistant", "Hi! I'm the virtual assistant here to help with hours, services, insurance, and appointments. How can I help?");
</script>

</body>
</html>
